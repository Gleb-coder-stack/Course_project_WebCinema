{% extends "base.html" %}

{% block title %}Управление сеансами{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1 class="page-title">УПРАВЛЕНИЕ СЕАНСАМИ</h1>
    <a href="/admin" style="color: white; text-decoration: none;">← Назад</a>
</div>

<button onclick="showAddForm()" class="btn btn-add">+ Добавить сеанс</button>

<!-- Форма добавления/редактирования -->
<div id="sessionForm"
     style="display: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 16px; margin-bottom: 20px;">
    <h3 id="formTitle" style="color: white; margin-bottom: 20px;">Новый сеанс</h3>
    <input type="hidden" id="editId" value="">

    <div class="form-group">
        <label>Дата</label>
        <input type="date" id="session_date" required
               style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
    </div>

    <div class="form-group">
        <label>Фильм</label>
        <select id="movie_id" required style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
            <option value="">Выберите фильм</option>
        </select>
    </div>

    <div class="form-group">
        <label>Время начала</label>
        <input type="time" id="start_time" required
               style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
    </div>

    <div class="form-group">
        <label>Время окончания</label>
        <input type="time" id="end_time" required style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
    </div>

    <div class="form-group">
        <label>Номер зала</label>
        <select id="hall_id" required style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
            <option value="1">Зал 1</option>
            <option value="2">Зал 2</option>
            <option value="3">Зал 3</option>
        </select>
    </div>

    <button onclick="saveSession()" class="btn btn-add">Сохранить</button>
    <button onclick="hideForm()" class="btn" style="background: #666;">Отмена</button>
</div>

<!-- Таблица сеансов -->
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Дата</th>
        <th>Фильм</th>
        <th>Начало</th>
        <th>Конец</th>
        <th>Зал</th>
        <th>Действия</th>
    </tr>
    </thead>
    <tbody id="sessionsTableBody">
    <tr>
        <td colspan="7" style="text-align: center;">Загрузка...</td>
    </tr>
    </tbody>
</table>

<script>
    let movies = [];

    document.addEventListener('DOMContentLoaded', async function() {
        await loadMovies();
        await loadSessions();
    });

    async function loadMovies() {
        try {
            const response = await fetch('/api/movies');
            movies = await response.json();

            const select = document.getElementById('movie_id');
            select.innerHTML = '<option value="">Выберите фильм</option>';
            movies.forEach(movie => {
                select.innerHTML += `<option value="${movie.id}">${movie.title}</option>`;
            });
        } catch (error) {
            console.error('Ошибка загрузки фильмов:', error);
        }
    }

    async function loadSessions() {
        try {
            const response = await fetch('/api/sessions');
            const sessions = await response.json();

            const tbody = document.getElementById('sessionsTableBody');
            tbody.innerHTML = '';

            sessions.forEach(session => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${session.id}</td>
                    <td>${session.date}</td>
                    <td>${session.movie}</td>
                    <td>${session.start_time}</td>
                    <td>${session.end_time}</td>
                    <td>${session.hall}</td>
                    <td>
                        <button class="btn btn-edit" onclick='editSession(${JSON.stringify(session)})'>✏️ Ред.</button>
                        <button class="btn btn-delete" onclick="deleteSession(${session.id})">🗑️ Удал.</button>
                    </td>
                `;
            });
        } catch (error) {
            console.error('Ошибка загрузки сеансов:', error);
        }
    }

    function showAddForm() {
        document.getElementById('formTitle').textContent = 'Новый сеанс';
        document.getElementById('editId').value = '';
        document.getElementById('session_date').value = '';
        document.getElementById('movie_id').value = '';
        document.getElementById('start_time').value = '';
        document.getElementById('end_time').value = '';
        document.getElementById('hall_id').value = '1';
        document.getElementById('sessionForm').style.display = 'block';
    }

    function editSession(session) {
        document.getElementById('formTitle').textContent = 'Редактирование сеанса';
        document.getElementById('editId').value = session.id;
        document.getElementById('session_date').value = session.date_raw || session.date.split('.').reverse().join('-');
        document.getElementById('movie_id').value = session.movie_id || getMovieIdByTitle(session.movie);
        document.getElementById('start_time').value = session.start_time;
        document.getElementById('end_time').value = session.end_time;
        document.getElementById('hall_id').value = session.hall;
        document.getElementById('sessionForm').style.display = 'block';
    }

    function getMovieIdByTitle(title) {
        const movie = movies.find(m => m.title === title);
        return movie ? movie.id : '';
    }

    function hideForm() {
        document.getElementById('sessionForm').style.display = 'none';
    }

    async function saveSession() {
        const id = document.getElementById('editId').value;
        const sessionData = {
            session_date: document.getElementById('session_date').value,
            movie_id: parseInt(document.getElementById('movie_id').value),
            start_time: document.getElementById('start_time').value,
            end_time: document.getElementById('end_time').value,
            hall_id: parseInt(document.getElementById('hall_id').value)
        };

        // Валидация
        if (!sessionData.session_date || !sessionData.movie_id || !sessionData.start_time || !sessionData.end_time) {
            alert('Заполните все поля');
            return;
        }

        if (sessionData.start_time >= sessionData.end_time) {
            alert('Время окончания должно быть позже времени начала');
            return;
        }

        try {
            let response;
            if (id) {
                response = await fetch(`/api/sessions/update/${id}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(sessionData)
                });
            } else {
                response = await fetch('/api/sessions/add', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(sessionData)
                });
            }

            const result = await response.json();
            if (result.success) {
                hideForm();
                await loadSessions();
                alert(id ? '✅ Сеанс обновлен' : '✅ Сеанс добавлен');
            } else {
                alert('❌ Ошибка: ' + (result.error || 'Неизвестная ошибка'));
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('❌ Ошибка сохранения');
        }
    }

    async function deleteSession(id) {
        if (!confirm('Удалить сеанс?')) return;

        try {
            const response = await fetch(`/api/sessions/delete/${id}`, {
                method: 'POST'
            });
            const result = await response.json();
            if (result.success) {
                await loadSessions();
                alert('✅ Сеанс удален');
            } else {
                alert('❌ Ошибка: ' + (result.error || 'Не удалось удалить'));
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('❌ Ошибка удаления');
        }
    }
</script>
{% endblock %}
