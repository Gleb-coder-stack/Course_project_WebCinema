{% extends "base.html" %}

{% block title %}Управление пользователями{% endblock %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h1 class="page-title">УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</h1>
    <a href="/admin" style="color: white; text-decoration: none;">← Назад</a>
</div>

<button onclick="showAddForm()" class="btn btn-add">+ Добавить пользователя</button>

<!-- Форма добавления/редактирования -->
<div id="userForm"
     style="display: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 16px; margin-bottom: 20px;">
    <h3 id="formTitle" style="color: white; margin-bottom: 20px;">Новый пользователь</h3>
    <input type="hidden" id="editId" value="">

    <div class="form-group">
        <label>Логин</label>
        <input type="text" id="username" style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
    </div>

    <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
        <small style="color: #ccc;">Оставьте пустым, если не хотите менять при редактировании</small>
    </div>

    <div class="form-group">
        <label>Роль</label>
        <select id="role" style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
            <option value="admin">Администратор</option>
            <option value="cashier">Кассир</option>
        </select>
    </div>

    <div class="form-group">
        <label>ФИО</label>
        <input type="text" id="full_name" style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
    </div>

    <button onclick="saveUser()" class="btn btn-add">Сохранить</button>
    <button onclick="hideForm()" class="btn" style="background: #666;">Отмена</button>
</div>

<!-- Таблица пользователей -->
<div style="overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden;">
        <thead>
        <tr style="background: #6A11CB; color: white;">
            <th style="padding: 12px;">ID</th>
            <th style="padding: 12px;">Логин</th>
            <th style="padding: 12px;">Пароль</th>
            <th style="padding: 12px;">Роль</th>
            <th style="padding: 12px;">ФИО</th>
            <th style="padding: 12px;">Действия</th>
        </tr>
        </thead>
        <tbody id="usersTableBody">
        <tr>
            <td colspan="6" style="text-align: center; padding: 20px;">Загрузка...</td>
        </tr>
        </tbody>
    </table>
</div>

<style>
    .btn {
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        margin: 0 5px;
    }
    .btn-edit {
        background: #4CAF50;
        color: white;
    }
    .btn-edit:hover {
        background: #45a049;
    }
    .btn-delete {
        background: #f44336;
        color: white;
    }
    .btn-delete:hover {
        background: #da190b;
    }
    .btn-add {
        background: #2196F3;
        color: white;
        padding: 12px 24px;
        font-size: 1.1rem;
        margin-bottom: 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    .btn-add:hover {
        background: #0b7dda;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', loadUsers);

    async function loadUsers() {
        try {
            const response = await fetch('/api/users');
            const users = await response.json();

            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Нет пользователей</td></tr>';
                return;
            }

            users.forEach(user => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td style="padding: 10px;">${user.id}</td>
                    <td style="padding: 10px;">${user.username}</td>
                    <td style="padding: 10px;">••••••••</td>
                    <td style="padding: 10px;">${user.role === 'admin' ? 'Администратор' : 'Кассир'}</td>
                    <td style="padding: 10px;">${user.full_name || '-'}</td>
                    <td style="padding: 10px;">
                        <button class="btn btn-edit" onclick="editUser(${user.id}, '${user.username}', '${user.role}', '${user.full_name || ''}')">✏️ Ред.</button>
                        <button class="btn btn-delete" onclick="deleteUser(${user.id})">🗑️ Удал.</button>
                    </td>
                `;
            });
        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Ошибка загрузки</td></tr>';
        }
    }

    function showAddForm() {
        document.getElementById('formTitle').textContent = 'Новый пользователь';
        document.getElementById('editId').value = '';
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('password').required = true;
        document.getElementById('role').value = 'cashier';
        document.getElementById('full_name').value = '';
        document.getElementById('userForm').style.display = 'block';
    }

    function editUser(id, username, role, full_name) {
        document.getElementById('formTitle').textContent = 'Редактирование пользователя';
        document.getElementById('editId').value = id;
        document.getElementById('username').value = username;
        document.getElementById('password').value = '';
        document.getElementById('password').required = false;
        document.getElementById('role').value = role;
        document.getElementById('full_name').value = full_name;
        document.getElementById('userForm').style.display = 'block';
    }

    function hideForm() {
        document.getElementById('userForm').style.display = 'none';
    }

    async function saveUser() {
        const id = document.getElementById('editId').value;
        const userData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
            full_name: document.getElementById('full_name').value
        };

        if (!userData.username) {
            alert('Введите логин');
            return;
        }

        if (!id && !userData.password) {
            alert('Введите пароль');
            return;
        }

        try {
            let response;
            if (id) {
                response = await fetch(`/api/users/update/${id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
            } else {
                response = await fetch('/api/users/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
            }

            const result = await response.json();

            if (result.success) {
                alert(id ? '✅ Пользователь обновлен' : '✅ Пользователь добавлен');
                hideForm();
                loadUsers();
            } else {
                alert('❌ Ошибка: ' + (result.error || 'Неизвестная ошибка'));
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('❌ Ошибка сохранения');
        }
    }

    async function deleteUser(id) {
        if (!confirm('Удалить пользователя?')) return;

        try {
            const response = await fetch(`/api/users/delete/${id}`, { method: 'POST' });
            const result = await response.json();

            if (result.success) {
                alert('✅ Пользователь удален');
                loadUsers();
            } else {
                alert('❌ Ошибка: ' + (result.error || 'Не удалось удалить'));
            }
        } catch (error) {
            alert('❌ Ошибка при удалении');
        }
    }
</script>
{% endblock %}
