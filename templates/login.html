{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto;">
    <h1 class="page-title">ВХОД В СИСТЕМУ</h1>

    <div id="errorMessage" style="display: none; background: #ff6b6b; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>

    <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 16px;">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="username" value="admin" style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
        </div>

        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" value="admin123" style="width: 100%; padding: 10px; border-radius: 8px; border: none;">
        </div>

        <button onclick="doLogin()" class="nav-btn btn-login" style="width: 100%; padding: 15px; font-size: 1.2rem;">Войти</button>
    </div>
</div>

<script>
async function doLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');

    if (!username || !password) {
        showError('Введите логин и пароль');
        return;
    }

    try {
        console.log('Отправка запроса на авторизацию...');
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();
        console.log('Ответ сервера:', result);

        if (result.success) {
            // Сохраняем пользователя в sessionStorage
            sessionStorage.setItem('cinemaUser', JSON.stringify(result.user));
            console.log('Пользователь сохранен:', result.user);

            // Обновляем навбар
            if (typeof updateNavBar === 'function') {
                updateNavBar();
            }

            // Перенаправляем в зависимости от роли
            if (result.user.role === 'admin') {
                window.location.href = '/admin';
            } else {
                window.location.href = '/cashier';
            }
        } else {
            showError(result.error || 'Неверный логин или пароль');
        }
    } catch (error) {
        console.error('Ошибка:', error);
        showError('Ошибка соединения с сервером');
    }
}

function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    errorDiv.style.display = 'block';
    errorDiv.textContent = message;
}
</script>
{% endblock %}
