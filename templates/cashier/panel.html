{% extends "base.html" %}

{% block title %}Панель кассира{% endblock %}

{% block content %}
<h1 class="page-title">ПАНЕЛЬ КАССИРА</h1>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
    <a href="/cashier/sales" style="text-decoration: none;">
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 16px; text-align: center; border: 2px solid white; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <h3 style="color: white; font-size: 1.5rem;">🎫 Продажа билетов</h3>
        </div>
    </a>

    <a href="/cashier/returns" style="text-decoration: none;">
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 16px; text-align: center; border: 2px solid white; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <h3 style="color: white; font-size: 1.5rem;">↩️ Возврат билетов</h3>
        </div>
    </a>

    <a href="/cashier/tickets" style="text-decoration: none;">
        <div style="background: rgba(255,255,255,0.1); padding: 30px; border-radius: 16px; text-align: center; border: 2px solid white; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <h3 style="color: white; font-size: 1.5rem;">📋 Проданные билеты</h3>
        </div>
    </a>
</div>
{% endblock %}
