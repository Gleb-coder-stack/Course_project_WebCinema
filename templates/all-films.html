{% extends "base.html" %}

{% block title %}Все фильмы{% endblock %}

{% block content %}
<h1 class="page-title">ВСЕ ФИЛЬМЫ В ПРОКАТЕ</h1>

<div class="movies-grid" id="allMoviesGrid">
    <div style="color: white; text-align: center;">Загрузка фильмов...</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    try {
        const response = await fetch('/api/movies');
        const movies = await response.json();
        
        const grid = document.getElementById('allMoviesGrid');
        grid.innerHTML = '';
        
        if (!movies || movies.length === 0) {
            grid.innerHTML = '<div style="color: white; text-align: center;">Нет фильмов</div>';
            return;
        }
        
        // Показываем ВСЕ фильмы
        movies.forEach(movie => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <div class="movie-poster"></div>
                <div class="movie-info">
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-detail"><span>Жанр</span> ${movie.genre}</div>
                    <div class="movie-detail"><span>Время</span> ${movie.duration}</div>
                    <div class="age-badge">${movie.age_rating}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    } catch (error) {
        console.error('Ошибка:', error);
    }
});
</script>
{% endblock %}
